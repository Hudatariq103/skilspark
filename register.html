<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register - SkillSpark</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container py-5">
<form onsubmit="alert('Registration Successful!')">
<div class="row">
<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" class="form-control is-valid" required>
</div>
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control is-invalid" required>
</div>
</div>

<div class="mb-3">
<label>Course</label>
<select class="form-control">
<option>Web Development</option>
<option>App Development</option>
</select>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="mode">
<label class="form-check-label">Online</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">I agree</label>
</div>

<div class="mb-3">
<input type="file" class="form-control">
</div>

<button class="btn btn-primary">Submit</button>
</form>
</div>

</body>
</html>
